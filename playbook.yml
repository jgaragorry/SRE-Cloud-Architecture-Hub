---
- name: Despliegue SRE en Ubuntu Limpio
  hosts: all
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Instalar Python para Ansible
      raw: apt-get update && apt-get install -y python3
      changed_when: false

  tasks:
    - name: 1. Instalar Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: 2. Hardening - Deshabilitar firmas (Server Tokens)
      lineinfile:
        path: /etc/nginx/nginx.conf
        regexp: 'server_tokens'
        line: '	server_tokens off;'
        state: present
      notify: Reiniciar Nginx

    - name: 3. Asegurar que Nginx esté corriendo y habilitado
      service:
        name: nginx
        state: started
        enabled: yes

    - name: 4. Desplegar Index con Estilo Neo-Tech SRE 🟢
      copy:
        content: |
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <title>SRE Architecture Hub | gmt</title>
              <style>
                  body { 
                      background-color: #00FF41; /* Verde Nginx/Matrix */
                      display: flex; 
                      justify-content: center; 
                      align-items: center; 
                      height: 100vh; 
                      margin: 0; 
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                  }
                  .card {
                      background-color: #1A1A1A; /* Negro profundo */
                      color: #00FF41; 
                      padding: 50px; 
                      border-radius: 20px; 
                      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
                      text-align: center;
                      border: 3px solid #FFFFFF;
                      max-width: 600px;
                  }
                  h1 { font-size: 3.5rem; margin-bottom: 10px; text-shadow: 2px 2px #000; }
                  p { font-size: 1.4rem; color: #FFFFFF; margin: 10px 0; }
                  .highlight { color: #00FF41; font-weight: bold; font-family: monospace; }
                  .footer { margin-top: 30px; font-size: 0.9rem; opacity: 0.8; color: #888; }
              </style>
          </head>
          <body>
              <div class="card">
                  <h1>🚀 DEPLOY EXITOSO</h1>
                  <p>Servidor Inmutable Validado por <span class="highlight">gmt@MSI</span> 🔒</p>
                  <p>🛠️ <span class="highlight">SRE-Architecture-Hub v1.0.1</span></p>
                  <p>Estado: <b>PRODUCTION READY ✅</b></p>
                  <div class="footer">Infraestructura como Código | Vagrant + Ansible + Docker</div>
              </div>
          </body>
          </html>
        dest: /var/www/html/index.html
        mode: '0644'

  handlers:
    - name: Reiniciar Nginx
      service:
        name: nginx
        state: restarted
